<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AOSP ROM Device Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <header class="hero">
      <div class="hero-content">
        <p class="eyebrow">Community ROM Hub</p>
        <h1>AOSP ROM Distribution Catalog</h1>
        <p class="hero-description">
          Aggregating <code>device.json</code> data from LineageOS, AlphaDroid, AxionOS, Project Infinity, YAAP, and PixelOS. 
          Real-time updates directly from the source repositories.
        </p>
      </div>
      <button id="refreshBtn" type="button">Refresh Data</button>
    </header>

    <main>
      <section class="status-panel">
        <div class="status-header">
          <span class="status-indicator"></span>
          <h2>System Status</h2>
        </div>
        <p id="lastUpdated" class="muted">Initializing data fetch...</p>
      </section>

      <section>
        <div class="section-header">
          <h2>ROM Catalog</h2>
          <span id="romCountBadge" class="badge">0 Sources</span>
        </div>
        <div id="romGrid" class="rom-grid" aria-live="polite">
          <div class="skeleton-loader"></div>
          <div class="skeleton-loader"></div>
          <div class="skeleton-loader"></div>
        </div>
      </section>
    </main>

    <template id="romCardTemplate">
      <article class="rom-card">
        <div class="rom-card__header">
          <h3></h3>
          <a class="source-link" target="_blank" rel="noreferrer">Source</a>
        </div>
        <p class="rom-card__meta"></p>
        <p class="rom-card__error" hidden></p>
        <div class="device-list-container">
          <ul class="device-list"></ul>
        </div>
      </article>
    </template>

    <script src="script.js" type="module"></script>
  </body>
</html>
