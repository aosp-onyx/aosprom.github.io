<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROM Hub • Advanced Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <header class="hero">
      <div class="hero-content">
        <p class="eyebrow">The Community ROM Hub</p>
        <h1>Next-Gen AOSP Catalog</h1>
        <p class="hero-description">
          Real-time tracking for LineageOS, AlphaDroid, AxionOS, YAAP, and PixelOS. 
          Find, filter, and download your favorite ROMs.
        </p>
      </div>
      <div class="hero-actions">
        <button id="refreshBtn" type="button">Refresh Data</button>
      </div>
    </header>

    <main>
      <div class="search-container">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="searchInput" placeholder="Search by device, codename, or ROM name..." />
        </div>
      </div>

      <section class="status-panel">
        <div class="status-header">
          <span class="status-indicator"></span>
          <h2>System Insight</h2>
        </div>
        <div class="status-stats">
          <p id="lastUpdated" class="muted">Warming up engine...</p>
          <div class="badges">
             <span id="romCountBadge" class="badge">0 Sources</span>
             <span id="deviceCountBadge" class="badge">0 Devices</span>
          </div>
        </div>
      </section>

      <section>
        <div id="romGrid" class="rom-grid" aria-live="polite">
          <div class="skeleton-loader"></div>
          <div class="skeleton-loader"></div>
          <div class="skeleton-loader"></div>
        </div>
      </section>
    </main>

    <template id="romCardTemplate">
      <article class="rom-card">
        <div class="rom-card__header">
          <div class="rom-card__title-group">
            <h3></h3>
            <span class="rom-card__meta"></span>
          </div>
          <a class="source-link" target="_blank" rel="noreferrer">Source</a>
        </div>
        <p class="rom-card__error" hidden></p>
        <div class="device-list-container">
          <ul class="device-list"></ul>
        </div>
      </article>
    </template>

    <script src="script.js" type="module"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
